name: "Pull Request Labeler"

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited]

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Label based on files
        uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Label based on title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const labels = [];
            
            if (/^feat:/i.test(title)) labels.push('feature');
            if (/^fix:/i.test(title)) labels.push('bugfix');
            if (/^chore:/i.test(title)) labels.push('chore');
            if (/^ci:/i.test(title)) labels.push('ci');
            if (/^style:/i.test(title)) labels.push('style');
            if (/^docs:/i.test(title)) labels.push('documentation');
            if (/^refactor:/i.test(title)) labels.push('enhancement');
            if (/^tests:/i.test(title)) labels.push('code-quality');
            if (/^build\(deps\):/i.test(title)) labels.push('dependencies');
            
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: labels
              });
            }

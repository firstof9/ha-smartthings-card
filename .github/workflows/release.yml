name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to upload assets to'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and upload release asset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
      - name: Upload card bundle
        uses: softprops/action-gh-release@v3
        with:
          files: smartthings-card.js
          tag_name: ${{ github.event.inputs.tag || github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

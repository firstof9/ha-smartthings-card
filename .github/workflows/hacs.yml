name: HACS Action

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  hacs:
    name: HACS Action
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: HACS Action
        uses: "hacs/action@main"
        with:
          category: "plugin"

name: HACS Action

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  hacs:
    name: HACS Action
    runs-on: hardened-runner
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: HACS Action
        uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa # @main
        with:
          category: "plugin"

name: HACS Action

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  hacs:
    name: HACS Action
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
      - name: HACS Action
        uses: "hacs/action@main"
        with:
          category: "plugin"
